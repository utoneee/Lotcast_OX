<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>是非吉凶</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Zen+Antique&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #120d1e;
    --bg2: #1d1530;
    --gold: #d4a843;
    --gold-light: #f0c860;
    --cream: #f0e8d0;
    --muted: #8a7a9a;
    --red: #c04040;
    --green: #2a7a4a;
  }

  body {
    background: #0a0812;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Serif TC', serif;
  }

  #app {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(212,168,67,0.15);
  }

  /* ─── LAYER 0: BACKGROUND IMAGE ─── */
  .bg-layer {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    border-radius: 20px;
    background: #120d1e;
  }
  .bg-layer img { display: none; }   /* 暫時隱藏，用 CSS background 代替 */
  .fg-layer { display: none; }       /* 前景圖待定，暫時隱藏 */

  /* ── 色塊佔位：主神像 ── */
  .statue-ph {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 160px;
    border-radius: 20px 20px 10px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.75);
    transition: filter 0.2s ease;
    pointer-events: none;
  }
  .enter-btn:hover .statue-ph { filter: brightness(1.2); }

  /* ── 色塊佔位：側邊小神像 ── */
  .side-ph {
    width: 56px;
    height: 130px;
    border-radius: 14px 14px 6px 6px;
    opacity: 0.3;
  }

  /* ─── LAYER 1: PARTICLE CANVAS ─── */
  #particle-canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ─── LAYER 2: FOG ─── */
  .fog-layer {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }
  .fog-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(52px);
  }
  .fog-blob-1 {
    width: 280px; height: 90px;
    background: radial-gradient(ellipse, rgba(212,168,67,0.22) 0%, transparent 70%);
    bottom: 220px; left: -70px;
    animation: fogDrift1 15s ease-in-out infinite;
  }
  .fog-blob-2 {
    width: 230px; height: 75px;
    background: radial-gradient(ellipse, rgba(155,125,215,0.18) 0%, transparent 70%);
    bottom: 150px; right: -50px;
    animation: fogDrift2 20s ease-in-out infinite;
  }
  .fog-blob-3 {
    width: 330px; height: 65px;
    background: radial-gradient(ellipse, rgba(212,168,67,0.15) 0%, transparent 70%);
    bottom: 55px; left: 20px;
    animation: fogDrift3 24s ease-in-out infinite;
  }
  @keyframes fogDrift1 {
    0%,100% { transform: translateX(0) scaleX(1); }
    40%     { transform: translateX(65px) scaleX(1.3); }
    70%     { transform: translateX(-30px) scaleX(0.8); }
  }
  @keyframes fogDrift2 {
    0%,100% { transform: translateX(0) scaleX(1); }
    35%     { transform: translateX(-65px) scaleX(1.25); }
    75%     { transform: translateX(30px) scaleX(0.85); }
  }
  @keyframes fogDrift3 {
    0%,100% { transform: translateX(0) scaleX(1); }
    50%     { transform: translateX(-55px) scaleX(1.4); }
  }

  /* ─── LAYER 10: SCREENS ─── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 10;
  }
  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
  }

  /* ─── LAYER 30: FLASH ─── */
  #flash-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    pointer-events: none;
    border-radius: 20px;
    opacity: 0;
    background: radial-gradient(ellipse at center,
      rgba(255,245,170,0.92) 0%,
      rgba(212,168,67,0.35) 40%,
      transparent 70%);
  }
  @keyframes flashAnim {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    100% { opacity: 0; }
  }
  #flash-overlay.flashing {
    animation: flashAnim 0.85s ease-out forwards;
  }

  /* ─── TOAST (layer 50) ─── */
  .toast {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,20,50,0.92);
    border: 1px solid rgba(212,168,67,0.35);
    color: var(--cream);
    font-size: 13px;
    letter-spacing: 1px;
    padding: 10px 22px;
    border-radius: 99px;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }


  /* ═══════════════════════════════════════════
     HOME SCREEN — CAROUSEL
     ═══════════════════════════════════════════ */
  #s-home { padding: 0; background: transparent; }

  /* ── Header (移到中段，約 y=168) ── */
  .home-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding-top: 168px;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    z-index: 5;
  }
  .home-title {
    font-family: 'Zen Antique', serif;
    font-size: 50px;
    color: var(--gold);
    letter-spacing: 12px;
    line-height: 1.1;
    text-align: center;
    text-shadow: 0 0 40px rgba(212,168,67,0.65), 0 2px 14px rgba(0,0,0,0.95);
  }
  .home-sub { display: none; }

  /* ── Speech bubble / cloud (122 → 318px) ── */
  .speech-bubble {
    position: absolute;
    top: 260px;
    left: 60px; right: 60px;
    height: 76px;
    z-index: 6;
    background: rgba(13,9,24,0.74);
    border: 1.5px solid rgba(212,168,67,0.26);
    border-radius: 50% 50% 46% 54% / 58% 58% 42% 42%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -14px;
    left: calc(50% - 6px);
    width: 11px;
    height: 16px;
    border-right: 1.5px solid rgba(212,168,67,0.22);
    border-bottom: 1.5px solid rgba(212,168,67,0.22);
    border-radius: 0 0 50% 0;
    background: transparent;
  }
  .bubble-text {
    display: block;
    font-size: 11px;
    color: var(--cream);
    letter-spacing: 2px;
    line-height: 1.5;
    text-align: center;
    padding: 0 12px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
  }

  /* ── Carousel area (355 → 542px, height=187px) ── */
  .carousel-area {
    position: absolute;
    top: 355px;
    left: 0; right: 0;
    bottom: 302px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }

  /* Side statues */
  .side-item {
    position: absolute;
    top: 0; bottom: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    pointer-events: none;
  }
  .side-item.at-prev { left: 0;  width: 82px; }
  .side-item.at-next { right: 0; width: 82px; }

  .side-statue-img {
    width: 66px;
    height: 148px;
    object-fit: contain;
    object-position: bottom center;
    opacity: 0.28;
    filter: blur(2px);
    display: block;
  }

  /* Main statue (center) */
  .main-item {
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    flex: 0 0 auto;
    height: 100%;
  }
  .enter-btn {
    position: relative;
    width: 148px;
    height: 100%;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .main-statue-img {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 148px;
    height: 100%;
    object-fit: contain;
    object-position: bottom center;
    transition: opacity 0.2s ease;
    user-select: none;
    -webkit-user-drag: none;
  }
  .main-statue-img.s-idle   { opacity: 1; }
  .main-statue-img.s-hover  { opacity: 0; }
  .main-statue-img.s-active { opacity: 0; }

  /* hover → 睜眼舉道具 (s-active image) */
  .enter-btn:hover .main-statue-img.s-idle   { opacity: 0; }
  .enter-btn:hover .main-statue-img.s-active { opacity: 1; }
  /* click → 腳印發亮 (s-hover image) */
  .enter-btn.active .main-statue-img.s-idle   { opacity: 0; }
  .enter-btn.active .main-statue-img.s-active { opacity: 0; }
  .enter-btn.active .main-statue-img.s-hover  { opacity: 1; }
  .enter-btn:not(.locked-active):hover {
    filter: drop-shadow(0 0 22px rgba(212,168,67,0.6));
  }

  /* Locked overlay */
  .locked-overlay {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,6,20,0.62);
    color: var(--muted);
    font-size: 15px;
    letter-spacing: 2px;
    gap: 8px;
    border-radius: 12px;
    cursor: default;
  }
  .locked-overlay .lock-icon { font-size: 32px; }
  .locked-overlay.visible { display: flex; }

  /* ── Navigation arrows ── */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    padding: 8px;
    cursor: pointer;
    color: rgba(212,168,67,0.5);
    transition: color 0.25s ease, opacity 0.5s ease;
    z-index: 7;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-arrow:hover { color: var(--gold); }
  .nav-arrow.left-arrow  { left: 2px; }
  .nav-arrow.right-arrow { right: 2px; }
  .nav-arrow.hide { opacity: 0; pointer-events: none; }

  /* ── Shadow ellipse under center statue (542 → 555px) ── */
  .statue-shadow {
    position: absolute;
    top: 542px;
    left: 50%;
    transform: translateX(-50%);
    width: 78px;
    height: 12px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 70%);
    filter: blur(3px);
    z-index: 3;
    pointer-events: none;
  }

  /* ── Mode dots (flow inside bottom-section) ── */
  .mode-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
    pointer-events: auto;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 99px;
    background: rgba(212,168,67,0.45);
    cursor: pointer;
    transition: background 0.3s, width 0.3s, box-shadow 0.3s;
  }
  .dot.active {
    background: var(--gold);
    width: 24px;
    box-shadow: 0 0 8px rgba(212,168,67,0.6);
  }

  /* ── Ornamental divider bar with circle endpoints (600px) ── */
  .ornament-bar {
    position: absolute;
    top: 600px;
    left: 22px; right: 22px;
    height: 1.5px;
    background: linear-gradient(to right,
      rgba(212,168,67,0.15),
      rgba(212,168,67,0.48) 25%,
      rgba(212,168,67,0.48) 75%,
      rgba(212,168,67,0.15));
    z-index: 6;
    pointer-events: none;
  }
  .ornament-bar::before,
  .ornament-bar::after {
    content: '';
    position: absolute;
    top: -5px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: rgba(212,168,67,0.52);
    box-shadow: 0 0 7px rgba(212,168,67,0.4);
  }
  .ornament-bar::before { left: -6px; }
  .ornament-bar::after  { right: -6px; }

  /* ── Bottom: mode name + desc (from 622px) ── */
  .bottom-section {
    position: absolute;
    top: 622px; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 16px;
    z-index: 6;
    pointer-events: none;
  }
  .mode-name {
    font-family: 'Zen Antique', serif;
    font-size: 20px;
    color: var(--cream);
    letter-spacing: 5px;
    text-align: center;
    text-shadow: 0 2px 12px rgba(0,0,0,0.95);
    margin-bottom: 10px;
  }
  .mode-desc {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-align: center;
    text-shadow: 0 1px 8px rgba(0,0,0,0.95);
  }

  /* ── Foreground image (inside #s-home) ── */
  .fg-layer {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    overflow: hidden;
  }
  .fg-layer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ═══════════════════════════════════════════
     INNER SCREENS
     ═══════════════════════════════════════════ */
  #s-coin, #s-stick, #s-result {
    background: rgba(10, 6, 20, 0.82);
  }

  .back-btn {
    position: absolute;
    bottom: 118px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: 1px solid rgba(138,122,154,0.4);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    letter-spacing: 2px;
    padding: 10px 32px;
    border-radius: 99px;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .back-btn:hover { color: var(--cream); border-color: rgba(212,168,67,0.5); }

  .badge {
    font-size: 11px;
    padding: 4px 16px;
    border-radius: 99px;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .badge-a { background: rgba(40,70,120,0.4); color: #90b8f0; border: 0.5px solid rgba(90,140,220,0.3); }
  .badge-b { background: rgba(100,60,20,0.4); color: #d4a050; border: 0.5px solid rgba(180,120,40,0.3); }

  .inner-title {
    font-size: 20px;
    color: var(--cream);
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-align: center;
  }
  .inner-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 40px;
    text-align: center;
  }

  /* COIN */
  .coin-wrap {
    margin-bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .coin {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f0c860, #a07820);
    border: 3px solid var(--gold-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
  }
  .coin::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 1px solid rgba(255,200,80,0.3);
  }
  .coin:hover { transform: scale(1.05) rotate(5deg); }
  .coin.spinning {
    animation: coinFlip 0.8s cubic-bezier(0.36,0.07,0.19,0.97) forwards;
  }
  @keyframes coinFlip {
    0%   { transform: rotateY(0) scale(1); }
    30%  { transform: rotateY(180deg) scale(1.15); }
    60%  { transform: rotateY(360deg) scale(1.2); }
    80%  { transform: rotateY(480deg) scale(1.1); }
    100% { transform: rotateY(540deg) scale(1); }
  }
  .tap-hint {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* STICK */
  .stick-wrap {
    margin-bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .stick-box {
    width: 90px;
    height: 170px;
    background: linear-gradient(180deg, #5a3520, #3d2210);
    border-radius: 12px 12px 4px 4px;
    border: 2px solid #7a5030;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .stick-box:hover { transform: translateY(-4px); }
  .stick-box::before {
    content: '籤';
    font-family: 'Zen Antique', serif;
    font-size: 48px;
    color: rgba(200,160,80,0.15);
    position: absolute;
    top: 10px;
  }
  .stick-peeking {
    width: 14px;
    height: 80px;
    background: linear-gradient(180deg, #f0d890, #c8a040);
    border-radius: 3px;
    box-shadow: -6px 0 0 rgba(200,160,60,0.4), 6px 0 0 rgba(200,160,60,0.4);
    position: relative;
  }
  .stick-peeking::before, .stick-peeking::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 72px;
    border-radius: 2px;
    top: 4px;
  }
  .stick-peeking::before { left: -20px; background: linear-gradient(180deg, #d4c070, #a08030); }
  .stick-peeking::after  { right: -20px; background: linear-gradient(180deg, #e8c860, #b09040); }
  .stick-box.shaking { animation: shakeBox 0.7s ease-out; }
  @keyframes shakeBox {
    0%   { transform: rotate(0deg); }
    15%  { transform: rotate(-10deg); }
    30%  { transform: rotate(10deg); }
    45%  { transform: rotate(-7deg); }
    60%  { transform: rotate(7deg); }
    75%  { transform: rotate(-3deg); }
    100% { transform: rotate(0deg); }
  }

  /* RESULT */
  .result-img {
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .result-img img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: dropIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .result-placeholder {
    width: 160px;
    height: 160px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Zen Antique', serif;
    font-size: 52px;
    color: var(--cream);
    animation: dropIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes dropIn {
    0%   { transform: translateY(-80px) scale(0.6) rotate(-10deg); opacity: 0; }
    100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
  }
  .result-label {
    font-family: 'Zen Antique', serif;
    font-size: 32px;
    color: var(--gold-light);
    letter-spacing: 6px;
    margin-bottom: 10px;
    text-align: center;
    animation: fadeUp 0.4s ease 0.3s both;
  }
  .result-desc {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 40px;
    text-align: center;
    animation: fadeUp 0.4s ease 0.4s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .btn-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 240px;
    animation: fadeUp 0.4s ease 0.5s both;
  }
  .btn-main {
    background: none;
    border: 1px solid rgba(212,168,67,0.5);
    color: var(--cream);
    padding: 13px 0;
    border-radius: 99px;
    font-size: 15px;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    transition: background 0.2s, border-color 0.2s;
    width: 100%;
  }
  .btn-main:hover { background: rgba(212,168,67,0.1); border-color: var(--gold); }
  .btn-sec {
    background: none;
    border: 0.5px solid rgba(138,122,154,0.4);
    color: var(--muted);
    padding: 11px 0;
    border-radius: 99px;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    transition: background 0.2s;
    width: 100%;
  }
  .btn-sec:hover { background: rgba(255,255,255,0.05); color: var(--cream); }
</style>
</head>
<body>

<div id="app">

  <!-- LAYER 0: BACKGROUND -->
  <div class="bg-layer"><img src="img/bg.png" alt=""></div>


  <!-- LAYER 1: PARTICLES -->
  <canvas id="particle-canvas" width="390" height="844"></canvas>

  <!-- LAYER 2: FOG -->
  <div class="fog-layer">
    <div class="fog-blob fog-blob-1"></div>
    <div class="fog-blob fog-blob-2"></div>
    <div class="fog-blob fog-blob-3"></div>
  </div>

  <!-- HOME (layer 10) — carousel layout -->
  <div id="s-home" class="screen">

    <!-- Header -->
    <div class="home-header">
      <div class="home-title">是非吉凶</div>
      <div class="home-sub">叩問神明．指引迷途</div>
    </div>

    <!-- Speech bubble -->
    <div class="speech-bubble" id="speechBubble">
      <span class="bubble-text" id="bubbleText">心中有疑，神明指引</span>
    </div>

    <!-- Carousel -->
    <div class="carousel-area" id="carouselArea">

      <!-- Left (previous) side statue -->
      <div class="side-item at-prev" id="prevItem">
        <div class="side-ph" id="prevPh"></div>
      </div>

      <!-- Center (main) statue -->
      <div class="main-item" id="mainItem">
        <button class="enter-btn" id="enterBtn">
          <div class="statue-ph" id="statuePh"></div>
          <div class="locked-overlay" id="lockedOverlay">
            <span class="lock-icon">🔒</span>
            <span>即將推出</span>
          </div>
        </button>
      </div>

      <!-- Right (next) side statue -->
      <div class="side-item at-next" id="nextItem">
        <div class="side-ph" id="nextPh"></div>
      </div>

      <!-- Navigation arrows -->
      <button class="nav-arrow left-arrow" id="leftArrow" aria-label="上一個">
        <svg width="28" height="44" viewBox="0 0 28 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 4 C14 4, 6 12, 6 22 C6 32, 14 40, 22 40" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <path d="M12 32 L6 40 L14 42" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>
      <button class="nav-arrow right-arrow" id="rightArrow" aria-label="下一個">
        <svg width="28" height="44" viewBox="0 0 28 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 4 C14 4, 22 12, 22 22 C22 32, 14 40, 6 40" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <path d="M16 32 L22 40 L14 42" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>
    </div>

    <!-- Shadow ellipse under center statue -->
    <div class="statue-shadow"></div>

    <!-- Ornamental divider bar with circle endpoints -->
    <div class="ornament-bar"></div>

    <!-- Bottom section: dots → mode name → description -->
    <div class="bottom-section">
      <div class="mode-dots" id="modeDots"></div>
      <div class="mode-name" id="modeName"></div>
      <div class="mode-desc" id="modeDesc"></div>
    </div>

    <!-- Foreground layer (z-index 4, above bg/particles/fog, below screens) -->
    <div class="fg-layer"><img src="img/fg.png" alt=""></div>

  </div>

  <!-- COIN (layer 10) -->
  <div id="s-coin" class="screen hidden">
    <button class="back-btn" onclick="go('home')">← 返回</button>
    <div class="badge badge-a">硬幣占卜</div>
    <div class="inner-title">心中默念你的問題</div>
    <div class="inner-sub">準備好了，點擊硬幣</div>
    <div class="coin-wrap">
      <div class="coin" id="coin" onclick="throwCoin()">🪙</div>
      <div class="tap-hint">點擊一次</div>
    </div>
  </div>

  <!-- STICK (layer 10) -->
  <div id="s-stick" class="screen hidden">
    <button class="back-btn" onclick="go('home')">← 返回</button>
    <div class="badge badge-b">木籤占卜</div>
    <div class="inner-title">心中默念你的問題</div>
    <div class="inner-sub">準備好了，搖動籤筒</div>
    <div class="stick-wrap">
      <div class="stick-box" id="stickBox" onclick="throwStick()">
        <div class="stick-peeking"></div>
      </div>
      <div class="tap-hint">點擊搖籤</div>
    </div>
  </div>

  <!-- RESULT (layer 10) -->
  <div id="s-result" class="screen hidden">
    <div class="result-img" id="resultImg"></div>
    <div class="result-label" id="resultLabel"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="btn-col">
      <button class="btn-main" id="retryBtn">再抽一次</button>
      <button class="btn-sec" onclick="go('home')">回到主畫面</button>
    </div>
  </div>

  <!-- LAYER 30: FLASH -->
  <div id="flash-overlay"></div>

  <!-- LAYER 50: TOAST -->
  <div class="toast" id="toast">🔒 此功能即將推出</div>


</div>

<script>
/* ═══════════════════════════════════════════
   ORIGINAL DIVINATION LOGIC — unchanged
   ═══════════════════════════════════════════ */
const IMG_PATH = {
  result_o:       'img/result_o.png',
  result_x:       'img/result_x.png',
  result_retry:   'img/result_retry.png',
  result_daji:    'img/result_daji.png',
  result_ji:      'img/result_ji.png',
  result_xiong:   'img/result_xiong.png',
  result_daxiong: 'img/result_daxiong.png',
};

const COIN = [
  { label:'是 ○',  desc:'方向正確，放心前行',   img:'result_o',     bg:'#0d2a1a' },
  { label:'否 ✕',  desc:'暫時停看聽，再想想',   img:'result_x',     bg:'#2a0d0d' },
  { label:'再一次', desc:'問題說清楚一點再問',   img:'result_retry', bg:'#1a1a2a' },
];
const STICK = [
  { label:'大吉', desc:'諸事順遂，好運連連',     img:'result_daji',    bg:'#0d2a0d' },
  { label:'吉',   desc:'吉象顯現，可放心行事',   img:'result_ji',      bg:'#1a2a0d' },
  { label:'凶',   desc:'稍加謹慎，避開風險',     img:'result_xiong',   bg:'#2a1a0d' },
  { label:'大凶', desc:'此時不宜妄動，靜待時機', img:'result_daxiong', bg:'#2a0d0d' },
];

let prevType = 'coin';

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('s-' + id).classList.remove('hidden');
}

function showResult(r) {
  const area = document.getElementById('resultImg');
  if (r.img && IMG_PATH[r.img]) {
    const img = new Image();
    img.src = IMG_PATH[r.img];
    img.onerror = () => {
      area.innerHTML = '<div class="result-placeholder" style="background:'+r.bg+'">'+r.label+'</div>';
    };
    img.className = '';
    img.alt = r.label;
    area.innerHTML = '';
    area.appendChild(img);
  } else {
    area.innerHTML = '<div class="result-placeholder" style="background:'+r.bg+'">'+r.label+'</div>';
  }
  document.getElementById('resultLabel').textContent = r.label;
  document.getElementById('resultDesc').textContent  = r.desc;
  triggerFlash();
  go('result');
}

function throwCoin() {
  const el = document.getElementById('coin');
  el.classList.add('spinning');
  el.style.pointerEvents = 'none';
  setTimeout(() => {
    el.classList.remove('spinning');
    el.style.pointerEvents = '';
    showResult(COIN[Math.floor(Math.random() * COIN.length)]);
  }, 800);
}

function throwStick() {
  const el = document.getElementById('stickBox');
  el.classList.add('shaking');
  el.style.pointerEvents = 'none';
  setTimeout(() => {
    el.classList.remove('shaking');
    el.style.pointerEvents = '';
    showResult(STICK[Math.floor(Math.random() * STICK.length)]);
  }, 700);
}

document.getElementById('retryBtn').onclick = () => go(prevType);

/* ═══════════════════════════════════════════
   CAROUSEL — HOME SCREEN
   ═══════════════════════════════════════════ */
const MODES = [
  {
    id: 'coin',
    name: '是非神君',
    desc: '點擊神君，以硬幣叩問是非',
    color: '#c07840',
    locked: false,
  },
  {
    id: 'stick',
    name: '吉凶判官',
    desc: '點擊判官，以木籤問卜吉凶',
    color: '#3a7a8a',
    locked: false,
  },
  {
    id: 'batch',
    name: '批次抽籤',
    desc: '即將推出，敬請期待',
    color: '#4a4560',
    locked: true,
  },
];

let currentIdx = 0;
let arrowHidden = false;

function wrap(i) {
  return ((i % MODES.length) + MODES.length) % MODES.length;
}

function updateCarousel(animated) {
  const m = MODES[currentIdx];
  const prev = MODES[wrap(currentIdx - 1)];
  const next = MODES[wrap(currentIdx + 1)];

  // 主色塊
  const ph = document.getElementById('statuePh');
  ph.style.background = m.color;
  ph.textContent = m.name;

  // 側邊色塊
  document.getElementById('prevPh').style.background = prev.color;
  document.getElementById('nextPh').style.background = next.color;

  // Locked overlay
  const overlay = document.getElementById('lockedOverlay');
  overlay.classList.toggle('visible', m.locked);

  // Bottom info
  document.getElementById('modeName').textContent = m.name;
  document.getElementById('modeDesc').textContent = m.desc;

  // Dots
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentIdx);
  });
}

let isNavigating = false;

// dir: 動畫方向(-1/1)，targetIdx: 可選，若有則直接跳到該 index
function navigate(dir, targetIdx) {
  if (isNavigating) return;
  isNavigating = true;

  const nextIdx = (targetIdx !== undefined) ? targetIdx : wrap(currentIdx + dir);
  const btn = document.getElementById('enterBtn');

  // Phase 1: 淡出
  btn.style.transition = 'opacity 0.16s ease, transform 0.16s ease';
  btn.style.opacity    = '0';
  btn.style.transform  = `scale(0.84) translateX(${dir > 0 ? -18 : 18}px)`;

  setTimeout(() => {
    currentIdx = nextIdx;          // 統一在這裡更新 index
    updateCarousel(false);

    // Phase 2: 設定起點
    btn.style.transition = 'none';
    btn.style.opacity    = '0';
    btn.style.transform  = `scale(0.84) translateX(${dir > 0 ? 18 : -18}px)`;

    // Phase 3: 淡入彈入
    requestAnimationFrame(() => requestAnimationFrame(() => {
      btn.style.transition = 'opacity 0.22s ease, transform 0.34s cubic-bezier(0.34,1.56,0.64,1)';
      btn.style.opacity    = '1';
      btn.style.transform  = 'scale(1) translateX(0)';
      setTimeout(() => {
        isNavigating = false;
        btn.style.cssText = '';
      }, 360);
    }));
  }, 170);
}

function hideArrows() {
  if (arrowHidden) return;
  arrowHidden = true;
  document.getElementById('leftArrow').classList.add('hide');
  document.getElementById('rightArrow').classList.add('hide');
}

// Build dots
(function buildDots() {
  const dotsEl = document.getElementById('modeDots');
  MODES.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => {
      if (i === currentIdx || isNavigating) return;
      navigate(i > currentIdx ? 1 : -1, i);  // 傳目標 index，不再自己覆蓋
    });
    dotsEl.appendChild(d);
  });
})();

// Arrow nav
document.getElementById('leftArrow').addEventListener('click',  () => { navigate(-1); hideArrows(); });
document.getElementById('rightArrow').addEventListener('click', () => { navigate(1);  hideArrows(); });

// Side items — tap to navigate
document.getElementById('prevItem').style.pointerEvents = 'auto';
document.getElementById('nextItem').style.pointerEvents = 'auto';
document.getElementById('prevItem').style.cursor = 'pointer';
document.getElementById('nextItem').style.cursor = 'pointer';
document.getElementById('prevItem').addEventListener('click', () => navigate(-1));
document.getElementById('nextItem').addEventListener('click', () => navigate(1));

// Enter button
let isSwiping = false;
document.getElementById('enterBtn').addEventListener('click', () => {
  if (isSwiping) return;
  const m = MODES[currentIdx];
  if (m.locked) { showToast(); return; }
  const btn = document.getElementById('enterBtn');
  btn.classList.add('active');
  setTimeout(() => btn.classList.remove('active'), 400);
  prevType = m.id;
  setTimeout(() => go(m.id), 200);
});

// ── 純手勢偵測（轉盤邏輯，不移動畫面） ──────────────────
(function setupSwipe() {
  let sx = 0, sy = 0, st = 0;
  let tracking = false, moved = false;

  function homeVisible() {
    return !document.getElementById('s-home').classList.contains('hidden');
  }

  function onStart(x, y) {
    if (!homeVisible() || isNavigating) return;
    sx = x; sy = y; st = Date.now();
    tracking = true; moved = false;
  }

  function onMove(x, y) {
    if (!tracking || moved) return;
    const adx = Math.abs(x - sx), ady = Math.abs(y - sy);
    if (adx < 6 && ady < 6) return;       // 還沒移夠
    if (ady > adx + 3) { tracking = false; return; } // 垂直優先 → 取消
    moved = true; isSwiping = true;        // 確認水平滑動
  }

  function onEnd(x) {
    if (!tracking) return;
    tracking = false;
    if (!moved) { isSwiping = false; return; }

    const dx  = x - sx;
    const vel = Math.abs(dx) / Math.max(Date.now() - st, 1);
    if (Math.abs(dx) > 40 || vel > 0.2) {
      navigate(dx < 0 ? 1 : -1);
    }
    setTimeout(() => { isSwiping = false; }, 400);
  }

  // Touch
  document.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  document.addEventListener('touchmove',  e => { if (tracking) onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  document.addEventListener('touchend',   e => { if (tracking) onEnd(e.changedTouches[0].clientX); }, { passive: true });

  // Mouse（桌面測試）
  let mdown = false;
  document.addEventListener('mousedown', e => { mdown = true;  onStart(e.clientX, e.clientY); });
  document.addEventListener('mousemove', e => { if (mdown) onMove(e.clientX, e.clientY); });
  document.addEventListener('mouseup',   e => { if (mdown) { mdown = false; onEnd(e.clientX); } });
})();

// Auto-hide arrows after 3.5s
setTimeout(hideArrows, 3500);

// Initial render
updateCarousel(false);

/* ═══════════════════════════════════════════
   SPEECH BUBBLE — rotating quotes
   ═══════════════════════════════════════════ */
const QUOTES = [
  '心中有疑，神明指引',
  '誠心一問，天機自現',
  '緣起緣滅，問卦而知',
  '靜心叩問，吉凶自明',
  '萬事皆有因果，一問便知',
  '心誠則靈，疑慮自解',
];
let qIdx = 0;
document.getElementById('speechBubble').addEventListener('click', () => {
  qIdx = (qIdx + 1) % QUOTES.length;
  const el = document.getElementById('bubbleText');
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.transform = 'translateY(-5px)';
  setTimeout(() => {
    el.textContent = QUOTES[qIdx];
    el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
  }, 160);
});

/* ═══════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════ */
let toastTimer = null;
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════════════
   VISUAL EFFECTS
   ═══════════════════════════════════════════ */

// Flash
function triggerFlash() {
  const f = document.getElementById('flash-overlay');
  f.classList.remove('flashing');
  void f.offsetWidth;
  f.classList.add('flashing');
}

// Particle system
(function () {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  const W = 390, H = 844;
  const pts = [];

  function spawn(y) {
    pts.push({
      x: Math.random() * W,
      y: y !== undefined ? y : -6,
      r: Math.random() * 1.7 + 0.4,
      vy: Math.random() * 0.55 + 0.18,
      swAmp: Math.random() * 0.7 + 0.15,
      swFreq: Math.random() * 0.018 + 0.004,
      phase: Math.random() * Math.PI * 2,
      a: Math.random() * 0.32 + 0.07,
      gold: Math.random() > 0.3,
    });
  }

  for (let i = 0; i < 45; i++) spawn(Math.random() * H);

  let t = 0;
  (function tick() {
    ctx.clearRect(0, 0, W, H);
    if (t % 22 === 0 && pts.length < 65) spawn();
    for (let i = pts.length - 1; i >= 0; i--) {
      const p = pts[i];
      p.y += p.vy;
      p.x += Math.sin(t * p.swFreq + p.phase) * p.swAmp;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.gold
        ? `rgba(212,168,67,${p.a})`
        : `rgba(240,215,150,${p.a})`;
      ctx.fill();
      if (p.y > H + 8) pts.splice(i, 1);
    }
    t++;
    requestAnimationFrame(tick);
  })();
})();

</script>
