<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-title" content="是非吉凶">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="img/icon-1.png?v=2">
<link rel="icon" type="image/png" href="img/icon-1.png?v=2">
<title>是非吉凶</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;700&family=Zen+Antique&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #e2dedb;
    --gold: #b8860b;
    --cream: #2a2218;
    --muted: #6a5a5a;
    /* v4 inner screen palette */
    --paper: #f6f3ec;
    --carbon: #1f1d18;
    --mute: #6f6a5c;
    --ghost: #8c8678;
    --bronze: #a8753a;
    --hair: rgba(31,29,24,0.16);
    --font-han: 'Noto Sans TC', sans-serif;
  }

  html, body {
    position: fixed; /* iOS Safari 對 fixed 元素無法捲動，根除鍵盤觸發的版面偏移 */
    top: 0; left: 0;
    width: 100%; height: 100svh; /* svh = 穩定的小視窗高度，鍵盤出現不影響 */
    overflow: hidden;
  }
  body {
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Noto Serif TC', serif;
  }

  #app {
    width: 390px;
    height: 844px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    touch-action: none;
  }

  /* ─── LAYER 0: BACKGROUND IMAGE ─── */


  /* ─── LAYER 1: PARTICLE CANVAS ─── */
  #particle-canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ─── LAYER 2: FOG ─── */
  .fog-layer {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }
  .fog-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(52px);
  }
  .fog-blob-1 {
    width: 280px; height: 90px;
    background: radial-gradient(ellipse, rgba(212,168,67,0.22) 0%, transparent 70%);
    bottom: 220px; left: -70px;
    animation: fogDrift1 15s ease-in-out infinite;
  }
  .fog-blob-2 {
    width: 230px; height: 75px;
    background: radial-gradient(ellipse, rgba(155,125,215,0.18) 0%, transparent 70%);
    bottom: 150px; right: -50px;
    animation: fogDrift2 20s ease-in-out infinite;
  }
  .fog-blob-3 {
    width: 330px; height: 65px;
    background: radial-gradient(ellipse, rgba(212,168,67,0.15) 0%, transparent 70%);
    bottom: 55px; left: 20px;
    animation: fogDrift3 24s ease-in-out infinite;
  }
  @keyframes fogDrift1 {
    0%,100% { transform: translateX(0) scaleX(1); }
    40%     { transform: translateX(65px) scaleX(1.3); }
    70%     { transform: translateX(-30px) scaleX(0.8); }
  }
  @keyframes fogDrift2 {
    0%,100% { transform: translateX(0) scaleX(1); }
    35%     { transform: translateX(-65px) scaleX(1.25); }
    75%     { transform: translateX(30px) scaleX(0.85); }
  }
  @keyframes fogDrift3 {
    0%,100% { transform: translateX(0) scaleX(1); }
    50%     { transform: translateX(-55px) scaleX(1.4); }
  }

  /* ─── LAYER 10: SCREENS ─── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 10;
  }
  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
  }


  /* ─── LAYER 60: INTRO OVERLAY ─── */
  #intro-overlay {
    position: absolute;
    inset: 0;
    z-index: 60;
    pointer-events: none;
    background: var(--bg);
    animation: introFade 1.4s ease-out 0.1s forwards;
  }
  @keyframes introFade {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ─── TOAST (layer 50) ─── */
  .toast {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translateX(-50%) translateY(calc(-50% + 20px));
    background: rgba(30,20,50,0.92);
    border: 1px solid rgba(212,168,67,0.35);
    color: #e8dcc8;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 10px 22px;
    border-radius: 99px;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-50%);
  }


  /* ═══════════════════════════════════════════
     HOME SCREEN — CAROUSEL
     ═══════════════════════════════════════════ */
  #s-home { padding: 0; background: transparent; }

  /* ── Header (移到中段，約 y=168) ── */
  .home-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding-top: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    z-index: 5;
  }
  .home-title {
    display: block;
    width: 330px;
    height: auto;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }
/* ── Speech bubble / cloud (122 → 318px) ── */
  .speech-bubble {
    position: absolute;
    top: 248px;
    left: 60px; right: 60px;
    z-index: 6;
    background: transparent;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .speech-bubble::after { content: none; }
  .bubble-text {
    display: block;
    font-family: var(--font-han);
    font-size: 11px;
    color: var(--mute);
    letter-spacing: 2px;
    line-height: 1.5;
    text-align: center;
    padding: 0 12px;
  }

/* ── Carousel area (355 → 542px, height=187px) ── */
  .carousel-area {
    position: absolute;
    top: 355px;
    left: 0; right: 0;
    bottom: 302px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }

  /* ── 圓柱轉盤 items ── */
  .c-item {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 148px;
    height: 100%;
    transform-origin: bottom center;
    will-change: transform, opacity;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* 漂浮動畫 */
  @keyframes statue-float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
  }
  @keyframes shadow-pulse {
    0%, 100% { transform: translateX(-50%) scaleX(1);    opacity: 0.55; }
    50%       { transform: translateX(-50%) scaleX(0.6);  opacity: 0.2;  }
  }

  /* 漂浮 wrapper — 帶著石像一起上下 */
  .c-float {
    position: absolute;
    bottom: -20px;   /* 石像往下移 */
    left: 0; right: 0;
    height: 100%;
    animation: statue-float 3.2s ease-in-out infinite;
  }
  #ci-1 .c-float { animation-delay: -1.1s; }
  #ci-2 .c-float { animation-delay: -2.2s; }

  /* 石像圖片 */
  .c-img {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 170px;
    object-fit: contain;
    object-position: bottom center;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }
  /* 石像幀 — JS 控制眨眼，CSS 只設預設 (idle=1, others=0) */
  .c-img.s-idle   { opacity: 1; }

  /* 關於頁 statue_d：滑到中間/hover 時 idle → hover 交叉淡入（只限 #ci-2） */
  #ci-2 .c-img.s-idle,
  #ci-2 .c-img.s-hover { transition: opacity 1.1s ease-in-out; }
  #ci-2 .c-img.s-hover { opacity: 0; }
  @media (hover: hover) {
    #ci-2.is-center:hover .s-hover { opacity: 1; }
    #ci-2.is-center:hover .s-idle  { opacity: 0; }
  }
  @media (hover: none) {
    #ci-2.deco-visible .s-hover { opacity: 1; }
    #ci-2.deco-visible .s-idle  { opacity: 0; }
  }

  /* 關於頁圈C：比石像晚 0.5s 出場（延遲只掛在顯示狀態→進場延遲、離場立即） */
  @media (hover: hover) { #ci-2.is-center:hover .c-deco { transition-delay: 0.5s; } }
  @media (hover: none)  { #ci-2.deco-visible .c-deco    { transition-delay: 0.5s; } }

  /* ── 裝飾物件：預設隱藏，hover 時浮現 ── */
  .c-deco {
    position: absolute;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  /* 桌機（真正有滑鼠的裝置）：hover 顯示 */
  @media (hover: hover) {
    .c-item.is-center:hover .c-deco { opacity: 1; }
  }

  /* 手機／觸控：滑到中間後延遲顯示，不依賴 hover */
  @media (hover: none) {
    .c-item.deco-visible .c-deco { opacity: 1; }
  }

  /* 水墨圈旋轉 */
  @keyframes deco-circle-rotate    { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} } /* 圈A 逆時針 */
  @keyframes deco-circle-rotate-cw { from{transform:rotate(0deg)} to{transform:rotate(360deg)}  } /* 圈B 順時針 */

  /* 整張裝飾圖浮動 */
  @keyframes deco-float-a { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-7px)} }
  @keyframes deco-float-b { 0%,100%{transform:translateY(-2px)} 50%{transform:translateY(-8px)} }

  /* 水墨圈（在石像後面，hover 時浮現） */
  .deco-circle {
    bottom: -10px;
    left: calc(50% - 105px);
    width: 210px;
    animation: deco-circle-rotate 14s linear infinite;
  }
  /* 神像C 星形裝飾搖晃動畫 */
  @keyframes deco-rock-a { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }
  @keyframes deco-rock-b { 0%,100%{transform:rotate(-8deg)}  50%{transform:rotate(8deg)}  }

  .deco-c1 {
    width: 36px;
    top: 8px;
    left: 22px;
    animation: deco-rock-a 4.0s ease-in-out infinite;
    animation-delay: 0s;
  }
  .deco-c2 {
    width: 64px;
    top: 32px;
    left: 100px;
    animation: deco-rock-b 4.5s ease-in-out infinite;
    animation-delay: -2.25s;
  }
  .deco-c3 {
    width: 68px;
    bottom: -20px;
    left: -18px;
    animation: deco-rock-a 3.8s ease-in-out infinite;
    animation-delay: 0.7s;
  }
  .deco-c4 {
    width: 12px;
    bottom: 30px;
    left: 126px;
    animation: deco-rock-b 4.8s ease-in-out infinite;
    animation-delay: 1.0s;
  }

  /* 圈B 放大，位置對齊圈A */
  #ci-1 .deco-circle {
    width: 210px;
    bottom: -14px;
    left: calc(50% - 105px);
    animation-name: deco-circle-rotate-cw;
  }

  /* 銅錢整張（裝飾-A.PNG） */
  .deco-coins {
    width: 200px;
    bottom: 5px;
    left: calc(50% - 100px);
    animation: deco-float-a 3.5s ease-in-out infinite;
  }

  /* 木籤整張（裝飾-B.PNG） */
  .deco-sticks {
    width: 195px;
    bottom: 5px;
    left: calc(50% - 98px);
    animation: deco-float-b 3.2s ease-in-out infinite;
  }

  /* 影子 — 跟著 c-item 移動，獨立縮放 */
  .c-shadow {
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 72px;
    height: 10px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.28) 0%, transparent 70%);
    filter: blur(4px);
    pointer-events: none;
    animation: shadow-pulse 3.2s ease-in-out infinite;
  }
  #ci-1 .c-shadow { animation-delay: -1.1s; }
  #ci-2 .c-shadow { animation-delay: -2.2s; }

  /* 鎖定遮罩 */

/* ── Mode dots (flow inside bottom-section) ── */
  .mode-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
    pointer-events: auto;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 99px;
    background: rgba(212,168,67,0.45);
    cursor: pointer;
    transition: background 0.3s, width 0.3s, box-shadow 0.3s;
  }
  .dot.active {
    background: var(--gold);
    width: 24px;
    box-shadow: 0 0 8px rgba(212,168,67,0.6);
  }

  /* ── Ornamental divider bar with circle endpoints (600px) ── */
  .ornament-bar {
    display: none;
    position: absolute;
    top: 555px;
    left: 22px; right: 22px;
    height: 1.5px;
    background: linear-gradient(to right,
      rgba(212,168,67,0.15),
      rgba(212,168,67,0.48) 25%,
      rgba(212,168,67,0.48) 75%,
      rgba(212,168,67,0.15));
    z-index: 6;
    pointer-events: none;
  }
  .ornament-bar::before,
  .ornament-bar::after {
    content: '';
    position: absolute;
    top: -5px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: rgba(212,168,67,0.52);
    box-shadow: 0 0 7px rgba(212,168,67,0.4);
  }
  .ornament-bar::before { left: -6px; }
  .ornament-bar::after  { right: -6px; }

  /* ── Bottom: mode name + desc (from 622px) ── */
  .bottom-section {
    position: absolute;
    top: 577px; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 16px;
    z-index: 6;
    pointer-events: none;
  }
  .mode-nav {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
    pointer-events: auto;
  }
  .nav-arrow {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 13px;
    cursor: pointer;
    padding: 6px 10px;
    opacity: 0.6;
    transition: opacity 0.2s;
    font-family: 'Noto Serif TC', serif;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-arrow:hover { opacity: 1; }
  .mode-name {
    font-family: var(--font-han);
    font-size: 20px;
    color: var(--cream);
    letter-spacing: 5px;
    text-align: center;
  }
  .mode-desc {
    font-family: var(--font-han);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-align: center;
    text-shadow: none;
  }
  .copyright {
    font-family: var(--font-han);
    font-size: 9px;
    color: var(--ghost);
    letter-spacing: 2px;
    text-align: center;
    margin-top: auto;
    padding-bottom: 28px;
    pointer-events: none;
    opacity: 0.6;
  }


  /* ═══════════════════════════════════════════
     INNER SCREENS
     ═══════════════════════════════════════════ */
  .back-btn {
    position: absolute;
    bottom: 200px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: 1px solid rgba(138,122,154,0.4);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    letter-spacing: 2px;
    padding: 10px 32px;
    border-radius: 99px;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .back-btn:hover { color: var(--cream); border-color: rgba(212,168,67,0.5); }

  .badge {
    font-size: 11px;
    padding: 4px 16px;
    border-radius: 99px;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .badge-a { background: rgba(40,70,120,0.4); color: #90b8f0; border: 0.5px solid rgba(90,140,220,0.3); }
  .badge-b { background: rgba(100,60,20,0.4); color: #d4a050; border: 0.5px solid rgba(180,120,40,0.3); }

  .inner-title {
    font-size: 20px;
    color: var(--cream);
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-align: center;
  }
  .inner-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 40px;
    text-align: center;
  }

  /* COIN — CSS 3D flip */
  .coin-wrap {
    margin-bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .coin-container {
    width: 170px;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
    transition: transform 0.15s;
  }
  .coin-container:hover { transform: scale(1.05); }
  .coin-face {
    width: 170px;
    display: block;
    pointer-events: none;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .coin-face.coin-back {
    position: absolute;
    top: 0; left: 0;
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
  }
  .coin-container.spinning {
    animation: coin3DFlip 1.8s linear forwards;
  }
  @keyframes coin3DFlip {
    0%   { transform: perspective(600px) rotateY(0deg)   scale(1);    }
    40%  { transform: perspective(600px) rotateY(500deg) scale(1.08); }
    75%  { transform: perspective(600px) rotateY(635deg) scale(1.03); }
    90%  { transform: perspective(600px) rotateY(675deg) scale(1.01); }
    100% { transform: perspective(600px) rotateY(720deg) scale(1);    }
  }

  /* STICK — 籤1杯子＋籤2籤桿分層搖晃 */
  .stick-wrap {
    margin-bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .stick-container {
    width: 120px;
    position: relative;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .stick-container:hover { transform: translateY(-4px); }
  .stick-sticks {
    width: 120px;
    display: block;       /* 流式，撐起容器高度 */
    pointer-events: none;
  }
  .stick-cup {
    position: absolute;
    top: 0; left: 0;
    width: 120px;
    display: block;       /* 絕對定位，蓋在籤桿前面 */
    pointer-events: none;
  }
  /* 杯子：小幅搖晃 */
  .stick-container.shaking .stick-cup {
    animation: shakeCup 0.7s ease-out;
  }
  /* 籤桿：幅度更大，帶上下移動 */
  .stick-container.shaking .stick-sticks {
    animation: shakeSticks 0.7s ease-out;
  }
  @keyframes shakeCup {
    0%   { transform: rotate(0deg);  }
    15%  { transform: rotate(-6deg); }
    30%  { transform: rotate(6deg);  }
    45%  { transform: rotate(-4deg); }
    60%  { transform: rotate(4deg);  }
    75%  { transform: rotate(-2deg); }
    100% { transform: rotate(0deg);  }
  }
  @keyframes shakeSticks {
    0%   { transform: rotate(0deg)   translateY(0px);  }
    10%  { transform: rotate(-14deg) translateY(-5px); }
    25%  { transform: rotate(13deg)  translateY(-7px); }
    40%  { transform: rotate(-11deg) translateY(-4px); }
    55%  { transform: rotate(10deg)  translateY(-6px); }
    70%  { transform: rotate(-7deg)  translateY(-2px); }
    85%  { transform: rotate(5deg)   translateY(-1px); }
    100% { transform: rotate(0deg)   translateY(0px);  }
  }

  /* RESULT */
  .result-img {
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .result-img img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: dropIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .result-placeholder {
    width: 160px;
    height: 160px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Zen Antique', serif;
    font-size: 52px;
    color: var(--cream);
    animation: dropIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes dropIn {
    0%   { transform: translateY(-80px) scale(0.6) rotate(-10deg); opacity: 0; }
    100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
  }
  .result-label {
    font-family: 'Zen Antique', serif;
    font-size: 32px;
    color: var(--gold);
    letter-spacing: 6px;
    margin-bottom: 10px;
    text-align: center;
    animation: fadeUp 0.4s ease 0.3s both;
  }
  .result-desc {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 40px;
    text-align: center;
    animation: fadeUp 0.4s ease 0.4s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }

  }
  .btn-col {
    display: flex;
    flex-direction: column;

    border: 1px solid rgba(212,168,67,0.5);

  /* ═══════════════════════════════════════════
     BATCH SCREENS
     ═══════════════════════════════════════════ */
  #s-batch, #s-batch-result {
    justify-content: flex-start;
    padding-top: 116px;
    padding-bottom: 64px;

  .tab-group {
    display: flex;
    width: 100%;
    max-width: 300px;
    background: rgba(255,255,255,0.05);
    border-radius: 99px;
    padding: 3px;
    margin-bottom: 20px;
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 8px 0;
    border-radius: 99px;

  .batch-textarea {

    background: rgba(255,255,255,0.05);

  .batch-textarea:focus { border-color: rgba(212,168,67,0.5); }

  .type-toggle {
    display: flex;
    width: 100%;
    max-width: 300px;
    gap: 10px;
    margin-bottom: 20px;
  }
  .type-btn {
    flex: 1;
    background: none;
    border: 1px solid rgba(212,168,67,0.25);
    color: var(--muted);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    letter-spacing: 2px;
    padding: 10px 0;
    border-radius: 99px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .type-btn.active {
    background: rgba(212,168,67,0.15);
    color: var(--gold);
    border-color: rgba(212,168,67,0.5);
  }

  #s-batch .btn-main { width: 100%; max-width: 300px; }

  .batch-result-list {
    width: 100%;
    max-width: 320px;
    max-height: 500px;
    overflow-y: auto;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .batch-result-list::-webkit-scrollbar { width: 3px; }
  .batch-result-list::-webkit-scrollbar-track { background: transparent; }
  .batch-result-list::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.3); border-radius: 99px; }

  .batch-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    border: 0.5px solid rgba(212,168,67,0.12);
  }
  .batch-item-name {
    font-size: 15px;
    color: #e8e0d0;
    letter-spacing: 1px;
  }
  .batch-badge {
    font-family: 'Zen Antique', serif;
    font-size: 13px;
    padding: 4px 14px;
    border-radius: 99px;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .batch-badge.bb-red     { background: #c04040; color: #fff; }
  .batch-badge.bb-orange  { background: #b85030; color: #fff; }
  .batch-badge.bb-gray    { background: #5a5a6a; color: #c8c8c8; }
  .batch-badge.bb-black   { background: #1c1c22; color: #7a7a88; border: 0.5px solid #333; }
  .batch-badge.bb-neutral { background: #4a4a58; color: #aaaabc; }

  #s-batch-result .btn-col { width: 100%; max-width: 300px; }

  .batch-result-list.two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(5, auto);
    grid-auto-flow: column;
    gap: 8px 28px;
  }

  /* ═══════════════════════════════════════════
     V4 REFINED — INNER SCREENS
     ═══════════════════════════════════════════ */
  #s-coin, #s-stick, #s-result,
  #s-batch, #s-batch-result {
    background: var(--bg);
  }

  /* Back button — v18 position kept, v4 color */
  .back-btn {
    font-family: var(--font-han);
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--mute);
    border-color: rgba(168,117,58,0.25);
  }
  .back-btn:hover { color: var(--bronze); border-color: rgba(168,117,58,0.5); }

  /* Badge — thin rule above, bronze text, no box */
  .badge {
    font-family: var(--font-han);
    font-weight: 400;
    font-size: 12px;
    padding: 16px 8px 0 8px;
    border-radius: 0;
    letter-spacing: 8px;
    text-indent: 8px;
    margin-bottom: 26px;
    background: none !important;
    border: none !important;
    color: var(--bronze) !important;
    position: relative;
  }
  .badge::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 22px; height: 0.5px;
    background: var(--bronze);
  }

  /* Inner titles */
  .inner-title {
    font-family: var(--font-han);
    font-weight: 300;
    font-size: 22px;
    color: var(--carbon);

  .inner-sub {
    font-family: var(--font-han);
    font-weight: 300;
    font-size: 12px;
    color: var(--mute);

    text-indent: 5px;
  }

  /* Result screen */
  .result-label {
    font-family: var(--font-han);
    font-weight: 500;
    color: var(--bronze);
    letter-spacing: 8px;
  }
  .result-desc {
    font-family: var(--font-han);
    font-weight: 300;
    color: var(--mute);
    letter-spacing: 4px;
  }

  /* Buttons */
  .btn-main {
    background: transparent;
    border: 0.5px solid rgba(168,117,58,0.45);
    color: var(--carbon);
    border-radius: 99px;
    font-family: var(--font-han);
    font-weight: 400;
    letter-spacing: 4px;
  }
  .btn-main:hover { background: rgba(168,117,58,0.06); border-color: var(--bronze); }
  .btn-sec {
    background: transparent;
    border: 0.5px solid rgba(168,117,58,0.55);
    border-radius: 99px;
    color: var(--mute);
    font-family: var(--font-han);
    font-weight: 400;
    letter-spacing: 4px;
  }
  .btn-sec::after { display: none; }
  .btn-sec:hover { color: var(--carbon); border-color: rgba(168,117,58,0.45); background: transparent; }

  /* Batch textarea */
  .batch-textarea {
    color: var(--carbon);
    background: rgba(168,117,58,0.06);
    border: 1px solid var(--hair);
    border-radius: 8px;
    font-family: var(--font-han);
    font-weight: 300;
    font-size: 16px; /* 防止 iOS Safari 聚焦時自動放大 */
  }
  .batch-textarea::placeholder { color: var(--ghost); }
  .batch-textarea:focus { border-color: var(--bronze); outline: none; }

  /* Batch tabs */
  .tab-group {
    background: transparent;
    border: none;
    border-bottom: 0.5px solid var(--hair);
    border-radius: 0;
    padding: 0;
  }
  .tab-btn {
    color: var(--ghost);
    font-family: var(--font-han);
    font-weight: 400;
    letter-spacing: 5px;
    text-indent: 5px;
    padding-left: 5px;
    padding-top: 14px;
    padding-bottom: 14px;
    position: relative;
  }
  .tab-btn.active { color: var(--carbon); background: none; }
  .tab-btn.active::after {
    content: '';
    position: absolute; left: 50%; bottom: -0.5px;
    transform: translateX(-50%);
    width: 100%; height: 1px;
    background: var(--bronze);
  }

  /* Type toggle */
  .type-toggle {
    border-top: 0.5px solid var(--hair);
    border-bottom: 0.5px solid var(--hair);
    gap: 0;
  }
  .type-btn {
    background: transparent;
    border: none;
    color: var(--mute);
    font-family: var(--font-han);
    font-weight: 400;
    letter-spacing: 8px;
    text-indent: 8px;
    padding-left: 8px;
    padding-top: 14px;
    padding-bottom: 14px;
    border-radius: 0;
  }
  .type-btn + .type-btn { border-left: 0.5px solid var(--hair); }
  .type-btn.active { color: var(--carbon); background: rgba(168,117,58,0.22); font-weight: 500; border-color: transparent; }

  /* Batch rows */
  .batch-row {
    background: transparent;
    border-bottom: 0.5px solid var(--hair);
    border-radius: 0;
  }
  .batch-item-name {
    font-family: var(--font-han);
    font-weight: 400;
    color: var(--carbon);
  }
  .batch-badge {
    font-family: var(--font-han);
    font-weight: 400;
    font-size: 11px;
    border-radius: 0;
    letter-spacing: 3px;
    text-indent: 3px;
    border: 0.5px solid currentColor;
  }
  .batch-badge.bb-red     { background: #db8700;  color: var(--paper);  border-color: transparent; }
  .batch-badge.bb-orange  { background: none;     color: #db8700;       border-color: transparent; }
  .batch-badge.bb-gray    { background: none;     color: #6b6252;       border-color: transparent; }
  .batch-badge.bb-black   { background: #6b6252;  color: var(--paper);  border-color: transparent; }
  .batch-badge.bb-neutral { background: none;     color: var(--ghost);  border-color: transparent; }

  #s-batch-result .inner-title { color: var(--carbon) !important; margin-bottom: 24px; }

  /* ═══════════════════════════════════════════
     INFO BUTTON & SCREEN
     ═══════════════════════════════════════════ */
  .info-btn {
    position: absolute;
    top: 54px; right: 20px;
    z-index: 7;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: none;
    border: 0.5px solid rgba(168,117,58,0.3);
    color: var(--mute);
    font-family: var(--font-han);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.2s, color 0.2s;
  }
  .info-btn:hover { color: var(--bronze); border-color: rgba(168,117,58,0.6); }

  #s-info {
    justify-content: center;
    padding-top: 48px;
    padding-bottom: 40px;
    gap: 0;
  }
  .info-scroll {
    width: 100%;
    max-width: 300px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    max-height: 100%;
  }
  .info-scroll::-webkit-scrollbar { display: none; }

  .info-section {
    padding: 12px 0;
  }
  .info-section-title {
    font-family: var(--font-han);
    font-size: 16px;
    font-weight: 500;
    color: var(--carbon);
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 10px;
  }
  .info-section-title::before {
    content: "";
    display: block;
    width: 28px;
    height: 1px;
    background: var(--bronze);

  .info-footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .footer-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .info-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 8px;
  }
  .info-mode-name {
    font-family: var(--font-han);
    font-size: 13px;
    color: var(--carbon);
    letter-spacing: 2px;
    white-space: nowrap;

  .info-text {
    font-family: var(--font-han);

    font-family: var(--font-han);
    font-size: 13px;
    font-weight: 500;

    display: flex;
    flex-wrap: wrap;

    font-family: var(--font-han);

    font-family: var(--font-han);
    font-size: 11px;
    color: var(--ghost);
    letter-spacing: 1px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .info-link {
    color: var(--bronze);
    font-size: 14px;
    letter-spacing: 1px;

    display: flex;
    justify-content: space-between;

</style>

<body>

<div id="app">

  <!-- LAYER 0: BACKGROUND -->


  <!-- LAYER 1: PARTICLES -->
  <canvas id="particle-canvas" width="390" height="844"></canvas>

  <!-- LAYER 2: FOG -->
  <div class="fog-layer">
    <div class="fog-blob fog-blob-1"></div>
    <div class="fog-blob fog-blob-2"></div>
    <div class="fog-blob fog-blob-3"></div>
  </div>

  <!-- HOME (layer 10) — carousel layout -->
  <div id="s-home" class="screen">

    <!-- Header -->
    <div class="home-header">
      <img class="home-title" src="img/top.webp" alt="是非吉凶">
    </div>

    <!-- Speech bubble -->
    <div class="speech-bubble" id="speechBubble">
      <span class="bubble-text" id="bubbleText">心中有疑，神明指引</span>
    </div>

    <!-- Carousel -->
    <div class="carousel-area" id="carouselArea">

      <!-- 4 神像：JS 依 currentIdx 計算位置 -->
      <!-- 是非神君：石像在後，銅錢在前（HTML 順序決定 z 層） -->
      <div class="c-item" id="ci-0" data-idx="0">
        <div class="c-float">
          <img class="c-deco deco-circle"  src="img/圈A.webp"  alt="">
          <img class="c-img s-idle"   src="img/statue_a_idle.webp"   alt="">
          <img class="c-deco deco-coins" src="img/裝飾-A.webp" alt="">
        </div>
        <div class="c-shadow"></div>
      </div>

      <!-- 吉凶判官：水墨圈最底，石像中間，籤在最前 -->
      <div class="c-item" id="ci-1" data-idx="1">
        <div class="c-float">
          <img class="c-deco deco-circle"  src="img/圈B.webp"  alt="">
          <img class="c-img s-idle"   src="img/statue_b_idle.webp"   alt="">
          <img class="c-deco deco-sticks" src="img/裝飾-B.webp" alt="">
        </div>
        <div class="c-shadow"></div>
      </div>

      <!-- 關於：statue_d + 圈C 裝飾（位置獨立調整） -->
      <div class="c-item" id="ci-2" data-idx="2">
        <div class="c-float">
          <img class="c-deco deco-c1" src="img/圈C1.webp" alt="" style="top:30px;left:32px;width:28px;">
          <img class="c-deco deco-c2" src="img/圈C2.webp" alt="" style="top:34px;left:94px;width:50px;">
          <img class="c-deco deco-c3" src="img/圈C3.webp" alt="" style="bottom:24px;left:4px;width:54px;">
          <img class="c-img s-idle"   src="img/statue_d_idle.webp"  alt="">
          <img class="c-img s-hover"  src="img/statue_d_hover.webp" alt="">
        </div>
        <div class="c-shadow"></div>
      </div>

      <!-- 批次抽籤：statue_c + 圈C 裝飾 -->
      <div class="c-item" id="ci-3" data-idx="3">
        <div class="c-float">
          <img class="c-deco deco-c1" src="img/圈C1.webp" alt="">
          <img class="c-deco deco-c2" src="img/圈C2.webp" alt="">
          <img class="c-deco deco-c3" src="img/圈C3.webp" alt="">
          <img class="c-deco deco-c4" src="img/圈C4.webp" alt="">
          <img class="c-img s-idle"   src="img/statue_c_idle.webp"  alt="">
        </div>
        <div class="c-shadow"></div>
      </div>
    </div>


    <!-- Ornamental divider bar with circle endpoints -->
    <div class="ornament-bar"></div>

    <!-- Bottom section: dots → mode name → description -->
    <div class="bottom-section">
      <div class="mode-dots" id="modeDots"></div>
      <div class="mode-nav">
        <button class="nav-arrow" onclick="snapTo(currentIdx - 1)">◀︎</button>
        <div class="mode-name" id="modeName"></div>
        <button class="nav-arrow" onclick="snapTo(currentIdx + 1)">▶︎</button>
      </div>
      <div class="mode-desc" id="modeDesc"></div>
      <div class="copyright">© UTONEEE 2026</div>
    </div>

  </div>

  <!-- COIN (layer 10) -->
  <div id="s-coin" class="screen hidden" onclick="throwCoin()">
    <button class="back-btn" onclick="event.stopPropagation(); go('home')">← 返回</button>
    <div class="badge badge-a">硬幣占卜</div>
    <div class="inner-title">心中默念你的問題</div>
    <div class="inner-sub">準備好了，點擊任意處</div>
    <div class="coin-wrap">
      <div class="coin-container" id="coin">
        <img class="coin-face coin-front" src="img/硬幣1.webp" alt="">
        <img class="coin-face coin-back"  src="img/硬幣2.webp" alt="">
      </div>
    </div>
  </div>

  <!-- STICK (layer 10) -->
  <div id="s-stick" class="screen hidden" onclick="throwStick()">
    <button class="back-btn" onclick="event.stopPropagation(); go('home')">← 返回</button>
    <div class="badge badge-b">木籤占卜</div>
    <div class="inner-title">心中默念你的問題</div>
    <div class="inner-sub">準備好了，點擊任意處</div>
    <div class="stick-wrap">
      <div class="stick-container" id="stickBox">
        <img class="stick-sticks" src="img/籤2.webp" alt="">
        <img class="stick-cup"    src="img/籤1.webp" alt="">
      </div>
    </div>
  </div>

  <!-- RESULT (layer 10) -->
  <div id="s-result" class="screen hidden">
    <div class="result-img" id="resultImg"></div>
    <div class="result-label" id="resultLabel"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="btn-col">
      <button class="btn-main" id="retryBtn">再抽一次</button>
      <button class="btn-sec" onclick="go('home')">回到主畫面</button>
    </div>
  </div>

  <!-- BATCH INPUT (layer 10) -->
  <div id="s-batch" class="screen hidden">
    <button class="back-btn" onclick="go('home')">← 返回</button>
    <div class="badge badge-c">批次抽籤</div>

    <div class="tab-group">
      <button class="tab-btn active" id="tab-num" onclick="switchBatchTab('num')">數字 0–9</button>
      <button class="tab-btn" id="tab-custom" onclick="switchBatchTab('custom')">自填項目</button>
    </div>

    <!-- 自填項目 -->
    <div class="batch-content hidden" id="batch-custom-content">
      <textarea class="batch-textarea" id="batchTextarea"
        placeholder="每行輸入一個項目&#10;例如：&#10;選項 A&#10;選項 B&#10;選項 C"></textarea>
    </div>

    <div class="type-toggle">

   ═══════════════════════════════════════════ */
let currentIdx = 0;
let dragX      = 0;
let didDrag    = false;
let decoTimer  = null;

function setDecoVisible(idx) {
  document.querySelectorAll('.c-item').forEach(item =>
    item.classList.toggle('deco-visible', +item.dataset.idx === idx)
  );
}
function clearDecoVisible() {
  clearTimeout(decoTimer);
  document.querySelectorAll('.c-item').forEach(item => item.classList.remove('deco-visible'));
}

const N              = MODES.length;
const SLOT_X         = 148;   // px：中心到側邊
const DRAG_RESISTANCE = 0.88;
const SNAP_THRESHOLD  = 42;   // px：觸發切換的最小距離

function wrap(i) { return ((i % N) + N) % N; }

function getVisualPos(itemIdx) {
  let offset = ((itemIdx - currentIdx) % N + N) % N;
  if (offset > Math.floor(N / 2)) offset -= N;  // wrap 右半圈到左側
  return offset + dragX / SLOT_X;
}

function applyTransforms(withTransition) {
  document.querySelectorAll('.c-item').forEach(item => {
    const idx  = +item.dataset.idx;
    const vp   = getVisualPos(idx);
    const absVp = Math.abs(vp);

    const x         = vp * SLOT_X;
    const baseScale = Math.max(0.52, 1 - absVp * 0.36);
    const scale     = baseScale * (1 + 0.5 * Math.max(0, 1 - absVp));
    const opacity = Math.max(0,    1 - absVp * 0.72);
    const blur    = Math.min(3,    absVp * 2.2);
    const zIndex  = Math.round((1 - Math.min(absVp, 1)) * 10);

    item.style.transition = withTransition
      ? 'transform 0.38s cubic-bezier(0.34,1.56,0.64,1), opacity 0.26s ease, filter 0.26s ease'
      : 'none';
    item.style.transform      = `translateX(calc(-50% + ${x}px)) scale(${scale.toFixed(3)})`;
    item.style.opacity        = opacity.toFixed(3);
    item.style.filter         = blur > 0.1 ? `blur(${blur.toFixed(1)}px)` : '';
    item.style.zIndex         = zIndex;
    item.style.pointerEvents  = absVp < 1.3 ? 'auto' : 'none';
    item.classList.toggle('is-center', absVp < 0.3);
  });

  // Bottom info & dots
  const m = MODES[currentIdx];
  document.getElementById('modeName').textContent = m.name;
  document.getElementById('modeDesc').textContent = m.desc;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentIdx));
}

function snapTo(targetIdx) {
  const oldIdx = currentIdx;
  currentIdx = wrap(targetIdx);
  dragX = 0;

  // 找出「繞背面跳位」的 item（從 -1 跳到 +1 或反過來）
  // 讓它先無形傳送到新位置，再用 transition 淡入，避免橫跨畫面的殘影
  document.querySelectorAll('.c-item').forEach(item => {
    const i = +item.dataset.idx;
    const vpOf = (base) => {
      let o = ((i - base) % N + N) % N;
      if (o > Math.floor(N / 2)) o -= N;  // 與 getVisualPos 同一條繞圈公式
      return o;
    };
    const oldVp = vpOf(oldIdx);
    const newVp = vpOf(currentIdx);
    if (Math.abs(newVp - oldVp) >= 2) {
      const x     = newVp * SLOT_X;
      const scale = Math.max(0.52, 1 - Math.abs(newVp) * 0.36);
      item.style.transition = 'none';
      item.style.opacity    = '0';
      item.style.transform  = `translateX(calc(-50% + ${x}px)) scale(${scale.toFixed(3)})`;
    }
  });

  clearDecoVisible();
  requestAnimationFrame(() => requestAnimationFrame(() => applyTransforms(true)));

  // carousel 動畫 ~380ms + 延遲 300ms 後顯示裝飾
  decoTimer = setTimeout(() => setDecoVisible(currentIdx), 680);
}

// ── 拖拽（跟手推動） ──
(function setupDrag() {
  let startX = 0, startY = 0;
  let tracking = false, dirLocked = false, isHoriz = false;

  function homeVisible() {
    return !document.getElementById('s-home').classList.contains('hidden');
  }

  function onStart(x, y) {
    if (!homeVisible()) return;
    startX = x; startY = y;
    tracking = true; dirLocked = false; isHoriz = false;
    clearDecoVisible();
  }

  function onMove(x, y) {
    if (!tracking) return;
    const dx = x - startX, dy = y - startY;
    if (!dirLocked) {
      if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
      isHoriz = Math.abs(dx) >= Math.abs(dy);
      dirLocked = true;
      if (!isHoriz) { tracking = false; return; }
    }
    if (!isHoriz) return;
    dragX = dx * DRAG_RESISTANCE;
    applyTransforms(false);
  }

  function onEnd(x) {
    if (!tracking) return;
    tracking = false;
    const dx = x - startX;
    if (isHoriz && Math.abs(dx) >= SNAP_THRESHOLD) {
      didDrag = true;
      snapTo(currentIdx + (dx < 0 ? 1 : -1));
    } else {
      dragX = 0;
      applyTransforms(true);
      // 拖曳未達門檻，snap 回原位：補回裝飾計時器
      decoTimer = setTimeout(() => setDecoVisible(currentIdx), 680);
    }
    setTimeout(() => { didDrag = false; }, 80);
  }

  // Touch
  document.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  document.addEventListener('touchmove',  e => { if (tracking) { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
  document.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientX), { passive: true });

  // Mouse（桌面測試）
  let mdown = false;
  document.addEventListener('mousedown', e => { mdown = true;  onStart(e.clientX, e.clientY); });
  document.addEventListener('mousemove', e => { if (mdown) onMove(e.clientX, e.clientY); });
  document.addEventListener('mouseup',   e => { if (mdown) { mdown = false; onEnd(e.clientX); } });
})();

// Particle system — 香火往上飄（深金 + 白）
(function () {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  const W = 390, H = 844;
  const pts = [];

  function spawn(y) {
    const isWhite = Math.random() > 0.42;  // 約 58% 白、42% 金（金色變多、白色總量維持）
    pts.push({
      x: Math.random() * W,
      y: y !== undefined ? y : H + 6,      // 從下方冒出
      // 約 18% 較大顆做層次，其餘維持細緻
      r: Math.random() < 0.18 ? Math.random() * 1.6 + 2.2 : Math.random() * 1.4 + 0.7,
      vy: -(Math.random() * 0.7 + 0.35),   // 往上飄速度（放慢）
      swAmp: Math.random() * 0.4 + 0.1,    // 左右擺幅縮小
      swFreq: Math.random() * 0.016 + 0.004,
      phase: Math.random() * Math.PI * 2,
      a: Math.random() * 0.5 + 0.45,       // 基準透明度（再拉高→更亮更實）
      isWhite,
      twFreq: Math.random() * 0.05 + 0.04, // 呼吸快慢（每顆不同，再加快）
      twPhase: Math.random() * Math.PI * 2, // 呼吸相位錯開→不同步閃爍
    });
  }

  for (let i = 0; i < 200; i++) spawn(Math.random() * H);

  let t = 0;
  (function tick() {
    ctx.clearRect(0, 0, W, H);
    if (t % 15 === 0 && pts.length < 270) spawn();
    for (let i = pts.length - 1; i >= 0; i--) {
      const p = pts[i];
      p.y += p.vy;
      p.x += Math.sin(t * p.swFreq + p.phase) * p.swAmp;
      // 呼吸閃爍：在基準透明度的 60%~100% 之間緩慢明滅
      const breath = 0.6 + 0.4 * (0.5 + 0.5 * Math.sin(t * p.twFreq + p.twPhase));
      const alpha = p.a * breath;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.isWhite
        ? `rgba(255,255,255,${alpha})`      // 純白
        : `rgba(217,163,116,${alpha})`;     // #d9a374
      ctx.fill();
      if (p.y < -8) pts.splice(i, 1);      // 飄出頂部移除
    }
    t++;
    requestAnimationFrame(tick);
  })();
})();

  } else {
    const raw = document.getElementById('batchTextarea').value;
    items = raw.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    if (items.length === 0) { showToast('尚未填寫項目，無法抽籤'); return; }
  }
  lastBatchItems     = items;
  lastBatchDivType   = batchDivType;
  lastBatchInputMode = batchInputMode;
  renderBatchResult(items, batchDivType, batchInputMode);
}

function renderBatchResult(items, type, inputMode) {
  const pool = type === 'yesno' ? COIN : STICK;
  const list = document.getElementById('batchResultList');
  list.innerHTML = '';
  list.classList.toggle('two-col', inputMode === 'num');
  items.forEach(item => {
    const r         = pool[Math.floor(Math.random() * pool.length)];
    const row       = document.createElement('div');
    row.className   = 'batch-row';
    const name      = document.createElement('span');
    name.className   = 'batch-item-name';
    name.textContent = item;
    const badge     = document.createElement('span');
    const badgeClass = BADGE_CLASS[r.label] || 'bb-neutral';
    badge.className  = 'batch-badge ' + badgeClass;
    const FORTUNE_TRIANGLE = { 'bb-red': ' ▲', 'bb-orange': ' ▲', 'bb-gray': ' ▼', 'bb-black': ' ▼' };
    const triangle   = type === 'fortune' ? (FORTUNE_TRIANGLE[badgeClass] || '') : '';
    badge.textContent = r.label + triangle;
    row.appendChild(name);
    row.appendChild(badge);
    list.appendChild(row);
  });
  triggerFlash();
  go('batch-result');
}


/* ═══════════════════════════════════════════
   OFFLINE / SERVICE WORKER
   ═══════════════════════════════════════════ */
const APP_VERSION = 'v46';

function showOfflineInstalled() {
  const btn = document.getElementById('offlineBtn');
  btn.textContent = '✓ 已可離線使用';
  btn.disabled = true;
  document.getElementById('infoVersion').textContent = '目前版本：' + APP_VERSION;
  document.getElementById('updateBtn').style.display = '';
  document.getElementById('removeBtn').style.display = '';
}

function removeOffline() {
  if (!confirm('確定要刪除離線資料嗎？')) return;
  navigator.serviceWorker.getRegistrations().then(regs =>
    Promise.all(regs.map(r => r.unregister()))
  ).then(() => caches.keys()).then(keys =>
    Promise.all(keys.map(k => caches.delete(k)))
  ).then(() => {
    document.getElementById('offlineBtn').textContent = '啟動離線使用';
    document.getElementById('offlineBtn').disabled = false;
    document.getElementById('updateBtn').style.display = 'none';
    document.getElementById('removeBtn').style.display = 'none';
    document.getElementById('infoVersion').textContent = '';
    showToast('離線資料已刪除');
  }).catch(() => showToast('刪除失敗，請重試'));
}

// 頁面載入時檢查是否已安裝 SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistration('./sw.js').then(reg => {
    if (reg && reg.active) showOfflineInstalled();
  });
}

function checkUpdate() {
  const btn = document.getElementById('updateBtn');
  if (!navigator.onLine) {
    showToast('目前離線，無法確認更新');
    return;
  }
  btn.textContent = '確認中…';
  btn.disabled = true;
  navigator.serviceWorker.getRegistration('./sw.js').then(reg => {
    if (!reg) { btn.textContent = '↺ 更新'; btn.disabled = false; return; }
    reg.update().then(() => {
      const sw = reg.installing || reg.waiting;
      if (sw) {
        sw.addEventListener('statechange', e => {
          if (e.target.state === 'activated') {
            btn.textContent = '↺ 重新載入';
            btn.disabled = false;
            btn.onclick = () => location.reload();
            showToast('發現新版本，點更新鍵重新載入');
          }
        });
      } else {
        showToast('已是最新版本 ' + APP_VERSION);
        btn.textContent = '↺ 更新';
        btn.disabled = false;
      }
    }).catch(() => {
      showToast('確認失敗，請稍後再試');
      btn.textContent = '↺ 更新';
      btn.disabled = false;
    });
  });
}

function installOffline() {
  if (!('serviceWorker' in navigator)) {
    showToast('此裝置不支援離線功能');
    return;
  }
  const btn = document.getElementById('offlineBtn');
  btn.textContent = '下載中…';
  btn.disabled = true;
  navigator.serviceWorker.register('./sw.js')
    .then(reg => {
      const sw = reg.installing || reg.waiting || reg.active;
      const finish = () => {
        showOfflineInstalled();
        showToast('離線快取完成');
      };
      if (sw && sw.state !== 'activated') {
        sw.addEventListener('statechange', e => {
          if (e.target.state === 'activated') finish();
        });
      } else {
        finish();
      }
    })
    .catch(() => {
      btn.textContent = '啟動離線使用';
      btn.disabled = false;
      showToast('安裝失敗，請重試');
    });
}
